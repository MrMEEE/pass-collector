# This is a location snippet — it must be included INSIDE a server {} block.
# Do NOT place this file in /etc/nginx/conf.d/ (that directory is auto-loaded
# at the http {} level where location directives are not allowed).
#
# Instead, copy to /etc/nginx/snippets/ and add the following line inside
# the HTTPS server block of your existing nginx config:
#
#   include /etc/nginx/snippets/pass-collector.nginx.conf;
#
# Exposes pass-collector at /pass-collector/ while proxying to the
# local Flask app running on 127.0.0.1:8000.

location = /pass-collector {
    return 301 /pass-collector/;
}

location /pass-collector/ {
    # Trailing slash strips the /pass-collector/ prefix before proxying.
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
}
